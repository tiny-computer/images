# PipeWire configuration for Tiny Microphone (virtual source)
# Place at: ~/.config/pipewire/pipewire.conf.d/91-tiny-microphone.conf
#   or:    /etc/pipewire/pipewire.conf.d/91-tiny-microphone.conf

context.modules = [
{   name = libpipewire-module-tiny-microphone
    args = {
        # Unix domain socket path (must match Android: cacheDir/tmp/.tiny.mic)
        socket.path     = "/tmp/.tiny.mic"

        # Source identity
        node.name       = "tiny_microphone_source"
        node.description = "Tiny Microphone Input"

        # Audio format (default: F32LE 48000 Hz mono)
        audio.format    = "F32LE"
        audio.rate      = 48000
        audio.channels  = 1
        audio.position  = [ MONO ]

        # Discard initial N seconds to prevent latency buildup
        # (the Android side starts streaming immediately; we skip the
        #  first N seconds so playback latency does not accumulate)
        discard.seconds = 2.0

        # Optional: per-stream overrides
        # stream.props = {
        #     node.latency = 1024/48000
        # }
    }
}
]
