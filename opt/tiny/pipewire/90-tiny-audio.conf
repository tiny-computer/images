# PipeWire configuration for Tiny Audio Sink
# Place at: ~/.config/pipewire/pipewire.conf.d/90-tiny-audio.conf
#   or:    /etc/pipewire/pipewire.conf.d/90-tiny-audio.conf

context.modules = [
{   name = libpipewire-module-tiny-audio
    args = {
        # Unix domain socket path (must match Android: cacheDir/tmp/.tiny.audio)
        socket.path     = "/tmp/.tiny.audio"

        # Sink identity
        node.name       = "tiny_audio_sink"
        node.description = "Tiny Audio Output"

        # Audio format (default: F32LE 48000 Hz stereo)
        audio.format    = "F32LE"
        audio.rate      = 48000
        audio.channels  = 2
        audio.position  = [ FL FR ]

        # Optional: per-stream overrides
        # stream.props = {
        #     node.latency = 1024/48000
        # }
    }
}
]
