# Example configuration below. Unless explicitly stated that a key can be omitted, all keys should be included.

# The code must be a valid filename; the container will be placed in a folder named after this value.
code: "trixie"
name: "Debian Trixie"
description: |
  w... Debian boxed installation media!!!
  
  This is a command-line-only version with no pre-installed graphical interface.
# Preview image. Must be an image URL.
preview: "/opt/tiny/preview.png"
# A webpage introducing your container. Can be omitted.
# webpage: "https://www.github.com/Cateners/tiny_computer"
# Tiny Container provides various features that can be used on demand.
feature:
  # "type" specifies the feature type to use. "audio" and "microphone" types can only appear once; only one graphical frontend can be enabled at a time.
  # audio type
  # When enabled, after the next container boot the Android side will read and play audio from cacheDir/tmp/.tiny.audio.
  # The container must deliver audio to /tmp/.tiny.audio on its own. See the source code for format details.
  - type: "audio"
    name: "Audio Playback"
    description: "When enabled, continuously captures audio from inside the container and plays it. Takes effect on the next container boot."
    enabled: false
  # microphone type
  # When enabled, Tiny Container will request microphone permission and connect to cacheDir/tmp/.tiny.mic to send microphone audio.
  # The container must process audio received from /tmp/.tiny.mic on its own. See the source code for format details.
  # This can only be enabled temporarily; there is no "enabled" property.
  - type: "microphone"
    name: "Microphone Forwarding"
    description: "Start the microphone and forward audio to the container in real time. Keeping the microphone on drains battery — remember to turn it off!"
  # lstat-cache type
  # If you have files or directories that won't change while the container is running and are accessed very frequently, they are good candidates for this list!
  # The software caches lstat information for these files, so proot can use the cached data directly when resolving paths. May speed things up by ~0.1%.
  - type: "lstat-cache"
    name: "Cache Path Info"
    description: |
      The software caches lstat information for these paths, so proot can use the cached data directly when resolving paths. May speed things up by ~0.1%.
      Of course, only add paths that you are certain will not change while the container is running.
    # Provide real paths. You can use $CONTAINER_DIR (container directory) and $CACHE_DIR (cache directory).
    path:
      - $CONTAINER_DIR
      - $CONTAINER_DIR/usr/bin
      - $CONTAINER_DIR/usr/lib/aarch64-linux-gnu/ld-linux-aarch64.so.1
      - $CONTAINER_DIR/usr/lib/aarch64-linux-gnu/libpci.so.3.13.0
