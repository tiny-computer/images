# 快捷命令的每一项的类型可以是“命令集合”或“命令”。
# 如果类型是命令，就需要包含名称、简介（可以缺失）、命令内容。
# 如果类型是命令集合，就需要包含名称、简介（可以缺失）、一堆命令。
# 当用户希望重置快捷命令时，会以默认快捷命令恢复。
quick_commands:
  - type: "command"
    name: 检查软件包更新并升级
    description: 一次性进行修复、更新、升级、清理软件包操作。不是更新小小容器软件本身！
    command: >
      sudo dpkg --configure -a && sudo apt update &&
      sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
      -o Dpkg::Options::="--force-confdef"
      -o Dpkg::Options::="--force-confold" full-upgrade &&
      sudo apt autoremove -y
  - type: "command"
    name: 查看系统信息
    description: 使用 fastfetch 查看系统信息
    command: fastfetch --structure meow && fastfetch --logo none
  - type: "command"
    name: 清屏
    command: clear
  - type: "command"
    name: 中断
    description: 向当前会话发送 Ctrl + C
    command: "\x03"
  - type: "command"
    name: 清理包管理器缓存
    command: sudo apt clean
  - type: "commands"
    name: 软件管理
    description: 在这里安装或卸载少数几个软件。想要更多还得自行熟悉 Linux 系统操作...
    commands:
      - type: "commands"
        name: 图形处理软件 Krita
        description: 虽然其实是绘画软件！
        commands:
          - type: "command"
            name: 安装
            command: >
              sudo apt update &&
              sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
              -o Dpkg::Options::="--force-confdef"
              -o Dpkg::Options::="--force-confold"
              install krita krita-l10n
          - type: "command"
            name: 卸载
            command: sudo apt autoremove --purge -y krita krita-l10n
      - type: "commands"
        name: 科学计算软件 Octave
        description: 一定程度上可以作为 Matlab 的平替。
        commands:
          - type: "command"
            name: 安装
            command: >
              sudo apt update &&
              sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
              -o Dpkg::Options::="--force-confdef"
              -o Dpkg::Options::="--force-confold"
              install octave
          - type: "command"
            name: 卸载
            command: sudo apt autoremove --purge -y octave
      - type: "commands"
        name: 视频剪辑软件 Kdenlive
        commands:
          - type: "command"
            name: 安装
            command: >
              sudo apt update &&
              sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
              -o Dpkg::Options::="--force-confdef"
              -o Dpkg::Options::="--force-confold"
              install kdenlive
          - type: "command"
            name: 卸载
            command: sudo apt autoremove --purge -y kdenlive
# 选项可以被开启或关闭，在下一次启动时生效。
# env, path, ld_library_path, ld_preload, args, pre_start_host_command, post_end_host_command, post_start_container_command
# 选项应该包含类型、名称、简介（可以缺失）、新增环境变量（可以缺失）、新增PATH（可以缺失）、
# 新增LD_LIBRARY_PATH（可以缺失）、新增LD_PRELOAD（可以缺失）、新增proot参数（可以缺失）
# 启动前在安卓端执行命令（可以缺失）
# 关闭后在安卓端执行命令（可以缺失）
# 启动后在容器执行命令（可以缺失）
# 选项集合应该包含类型、名称、简介（可以缺失）、一堆选项
options:
  - type: "option"
    name: 高分辨率支持
    description: 一键开启高清模式，显示更清晰的同时速度会变慢。
    env: ["GDK_SCALE=2", "QT_FONT_DPI=192"]
    enabled: false
  - type: "option"
    name: getifaddrs 桥接
    description: 安卓版本≥13的设备可能需要此选项以便运行某些网络程序。
    pre_start_host_command: $BIN_DIR/getifaddrs_bridge_server &
    post_end_host_command: pkill getifaddrs_bridge_server
    enabled: true
  - type: "options"
    name: 图形加速
    description: >-
      使用图形加速可部分利用设备GPU提升系统图形处理表现，
      但由于设备差异也可能导致容器系统及软件运行不稳定甚至异常退出。
    options:
      - type: "option"
        name: Virgl 加速
        description: 使用 Virgl 为使用 OpenGL ES 的应用提供加速。
        env: ["GALLIUM_DRIVER=virpipe"]
        pre_start_host_command: >
          $BIN_DIR/virgl_test_server --use-egl-surfaceless --use-gles
          --socket-path=$CACHE_DIR/tmp/.virgl_test &
        post_end_host_command: pkill virgl_test_server
        enabled: false
      - type: "options"
        name: Adreno GPU 加速
        description: >-
          只有部分 Adreno GPU 可使用的加速选项。
          以下选项最多选一个，其中“启用DRI3”只有在使用 Termux:X11 显示图形界面时才可用。
        options:
          - type: "option"
            name: Turnip + Zink 加速
            env: ["MESA_LOADER_DRIVER_OVERRIDE=zink", "VK_ICD_FILENAMES=/opt/tiny/extra/freedreno_icd.aarch64.json", "TU_DEBUG=noconform", "MESA_VK_WSI_DEBUG=sw"]
            enabled: false
          - type: "option"
            name: 启用 DRI3 的 Turnip + Zink 加速
            description: 你只应该在使用 Termux:X11 时使用它。
            env: ["MESA_LOADER_DRIVER_OVERRIDE=zink", "VK_ICD_FILENAMES=/opt/tiny/extra/freedreno_icd.aarch64.json", "TU_DEBUG=noconform"]
            enabled: false