      - type: "commands"
        name: Chromium 浏览器
        description: |
          安装后，通过 Chromium No Sandbox 来打开浏览器。
          目前一个已知问题是 Chromium 无法登录谷歌账号，原因不明。
        commands:
          - type: "command"
            name: 安装
            command: >
              sudo apt update &&
              sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
              -o Dpkg::Options::="--force-confdef"
              -o Dpkg::Options::="--force-confold"
              install chromium chromium-l10n -y &&
              cp /usr/share/applications/chromium.desktop /usr/share/applications/chromium-no-sandbox.desktop &&
              sed -i '/^Name\[.*\]=.*/d; s/^Name=.*/Name=Chromium No Sandbox/' /usr/share/applications/chromium-no-sandbox.desktop &&
              sed -i 's#Exec=/usr/bin/chromium %U#Exec=/usr/bin/chromium --no-sandbox %U#g' /usr/share/applications/chromium-no-sandbox.desktop
          - type: "command"
            name: 卸载
            command: sudo apt autoremove --purge -y chromium chromium-l10n && rm /usr/share/applications/chromium-no-sandbox.desktop
      - type: "commands"
        name: Visual Studio Code
        description: 安装后，通过 Code No Sandbox 来打开 VS Code 。
        commands:
          - type: "command"
            name: "安装"
            command: >
              curl -L -o /tmp/vscode.deb 'https://aka.ms/linux-arm64-deb' &&
              sudo apt update &&
              sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
              -o Dpkg::Options::="--force-confdef"
              -o Dpkg::Options::="--force-confold"
              install /tmp/vscode.deb &&
              cp /usr/share/applications/code.desktop /usr/share/applications/code-no-sandbox.desktop &&
              sed -i '/^Name$$.*$$=.*/d; s/^Name=.*/Name=Code No Sandbox/' /usr/share/applications/code-no-sandbox.desktop &&
              sed -i 's#Exec=/usr/share/code/code %F#Exec=/usr/share/code/code --no-sandbox %F#g' /usr/share/applications/code-no-sandbox.desktop;
              rm /tmp/vscode.deb
          - type: "command"
            name: "卸载"
            command: |
              sudo apt autoremove --purge -y code && sudo rm -f /usr/share/applications/code-no-sandbox.desktop
      - type: "commands"
        name: 星火应用商店
        description: |
          注意小小容器的linux环境和正常的linux电脑不同，许多应用不经过修补无法正常使用。所以很容易出现星火应用商店中下载安装的应用无法安装或使用的情况。
