  - type: "commands"
    name: 运行 Windows 软件
    description: |
      安装 Hangover Wine，通过 Hangover 运行 exe。
      运行慢、运行失败等等都是十分正常的。
      *Windows 软件尽量放在小小容器内部而不是安卓侧存储空间。这是因为存储空间的文件没有可执行权限，可能影响软件运行。
    commands:
      - type: "commands"
        name: 安装和卸载
        description: |
          如果安装失败，你也可以亲自前往
          https://github.com/AndreRH/hangover/releases
          下载最新的 Debian 13 版本。
        commands:
          - type: "command"
            name: 安装 Hangover 11.9
            description: 安装前，请先在选项配置-杂项中启用 Hangover 配置并重启容器！
            command: bash /opt/tiny/extra/install-hangover-stable.sh
          - type: "command"
            name: 安装 Hangover 最新版
            description: 安装前，请先在选项配置-杂项中启用 Hangover 配置并重启容器！
            command: bash /opt/tiny/extra/install-hangover.sh
          - type: "command"
            name: 卸载
            command: sudo apt autoremove --purge -y hangover*
          - type: "command"
            name: 抹除 Wine 数据
            command: rm -rf ~/.wine
      - type: "commands"
        name: Wine 实用命令
        description: 必须安装并启用了 Hangover 才能使用的命令。
        commands:
          - type: "command"
            name: "Wine配置"
            command: "winecfg &"
          - type: "command"
            name: "修复方块字"
            command: "regedit Z:\\\\opt\\\\tiny\\\\extra\\\\chn_fonts.reg && wine reg delete \"HKEY_LOCAL_MACHINE\\Software\\Microsoft\\Windows NT\\CurrentVersion\\FontSubstitutes\" /va /f"
          - type: "command"
            name: "开始菜单文件夹"
            command: "wine explorer \"C:\\\\ProgramData\\\\Microsoft\\\\Windows\\\\Start Menu\\\\Programs\" &"
          - type: "command"
            name: "开启DXVK"
            description: DXVK在Hangover安装后默认是关闭状态。
            command: |
              WINEDLLOVERRIDES="d3d8=n,d3d9=n,d3d10core=n,d3d11=n,dxgi=n" wine reg add 'HKEY_CURRENT_USER\Software\Wine\DllOverrides' /v d3d8 /d native /f >/dev/null 2>&1
              WINEDLLOVERRIDES="d3d8=n,d3d9=n,d3d10core=n,d3d11=n,dxgi=n" wine reg add 'HKEY_CURRENT_USER\Software\Wine\DllOverrides' /v d3d9 /d native /f >/dev/null 2>&1
              WINEDLLOVERRIDES="d3d8=n,d3d9=n,d3d10core=n,d3d11=n,dxgi=n" wine reg add 'HKEY_CURRENT_USER\Software\Wine\DllOverrides' /v d3d10core /d native /f >/dev/null 2>&1
              WINEDLLOVERRIDES="d3d8=n,d3d9=n,d3d10core=n,d3d11=n,dxgi=n" wine reg add 'HKEY_CURRENT_USER\Software\Wine\DllOverrides' /v d3d11 /d native /f >/dev/null 2>&1
              WINEDLLOVERRIDES="d3d8=n,d3d9=n,d3d10core=n,d3d11=n,dxgi=n" wine reg add 'HKEY_CURRENT_USER\Software\Wine\DllOverrides' /v dxgi /d native /f >/dev/null 2>&1
          - type: "command"
            name: "关闭DXVK"
            command: |
              WINEDLLOVERRIDES="d3d8=b,d3d9=b,d3d10core=b,d3d11=b,dxgi=b" wine reg add 'HKEY_CURRENT_USER\Software\Wine\DllOverrides' /v d3d8 /d builtin /f >/dev/null 2>&1
              WINEDLLOVERRIDES="d3d8=b,d3d9=b,d3d10core=b,d3d11=b,dxgi=b" wine reg add 'HKEY_CURRENT_USER\Software\Wine\DllOverrides' /v d3d9 /d builtin /f >/dev/null 2>&1
              WINEDLLOVERRIDES="d3d8=b,d3d9=b,d3d10core=b,d3d11=b,dxgi=b" wine reg add 'HKEY_CURRENT_USER\Software\Wine\DllOverrides' /v d3d10core /d builtin /f >/dev/null 2>&1
              WINEDLLOVERRIDES="d3d8=b,d3d9=b,d3d10core=b,d3d11=b,dxgi=b" wine reg add 'HKEY_CURRENT_USER\Software\Wine\DllOverrides' /v d3d11 /d builtin /f >/dev/null 2>&1
              WINEDLLOVERRIDES="d3d8=b,d3d9=b,d3d10core=b,d3d11=b,dxgi=b" wine reg add 'HKEY_CURRENT_USER\Software\Wine\DllOverrides' /v dxgi /d builtin /f >/dev/null 2>&1
          - type: "command"
            name: "我的电脑"
            command: "wine explorer &"
          - type: "command"
            name: "记事本"
            command: "notepad &"
          - type: "command"
            name: "扫雷"
            command: "winemine &"
          - type: "command"
            name: "注册表"
            command: "regedit &"
          - type: "command"
            name: "控制面板"
            command: "wine control &"
          - type: "command"
            name: "文件管理器"
            command: "winefile &"
          - type: "command"
            name: "任务管理器"
            command: "wine taskmgr &"
          - type: "command"
            name: "IE浏览器"
            description: 目前 Wine Gecko 没有 arm64 版本，所以这一项其实是不可用的。不知道最近的 AI 能不能带来一些转机......
            command: "wine iexplore &"
          - type: "command"
            name: "强制关闭Wine"
            command: "wineserver -k && wineserver -p"
# 选项可以被开启或关闭，在下一次启动时生效。
# env, path, ld_library_path, ld_preload, args, pre_start_host_command, post_end_host_command, post_start_container_command
# 选项应该包含类型、名称、简介（可以缺失）、新增环境变量（可以缺失）、新增PATH（可以缺失）、
# 新增LD_LIBRARY_PATH（可以缺失）、新增LD_PRELOAD（可以缺失）、新增proot参数（可以缺失）
# 启动前在安卓端执行命令（可以缺失）
# 关闭后在安卓端执行命令（可以缺失）
# 启动后在容器执行命令（可以缺失）
# 选项集合应该包含类型、名称、简介（可以缺失）、一堆选项
options:
  - type: "option"
    name: 高分辨率支持
    description: 一键开启高清模式，显示更清晰的同时速度会变慢。
    env: ["GDK_SCALE=2", "QT_FONT_DPI=192"]
    enabled: false
  - type: "options"
    name: 杂项
    options:
      - type: "option"
        name: 常用文件夹挂载
        description: 将安卓对应文件夹挂载到容器的主文件夹。注意整个外置存储其实已经被挂载至 /mnt/sdcard，不受此处控制。
        args:
          - --mount=/storage/self/primary/Pictures:/home/tiny/图片
          - --mount=/storage/self/primary/Music:/home/tiny/音乐
          - --mount=/storage/self/primary/Movies:/home/tiny/视频
          - --mount=/storage/self/primary/Download:/home/tiny/下载
          - --mount=/storage/self/primary/DCIM:/home/tiny/照片
          - --mount=/storage/self/primary/Documents:/home/tiny/文档
        enabled: true
      - type: "option"
        name: 常用字体位置挂载
        description: 将挂载安卓系统字体位置、容器预置字体位置、以及安卓侧 WPS、永中Office 读取的字体位置。
        args:
          - --mount=/storage/self/primary/Fonts:/usr/share/fonts/wpsm
          - --mount=/storage/self/primary/AppFiles/Fonts:/usr/share/fonts/yozom
          - --mount=/system/fonts:/usr/share/fonts/androidm
          - --mount=$CONTAINER_DIR/opt/tiny/font:/usr/share/fonts/tiny
        enabled: true
      - type: "option"
        name: 音频库挂载
        description: 让容器内音频和麦克风工作的先决条件。如果你完全不需要音频，可以关闭以节省性能。
        args:
          - "--mount=$CONTAINER_DIR/opt/tiny/pipewire/90-tiny-audio.conf:/etc/pipewire/pipewire.conf.d/90-tiny-audio.conf"
          - "--mount=$CONTAINER_DIR/opt/tiny/pipewire/91-tiny-microphone.conf:/etc/pipewire/pipewire.conf.d/91-tiny-microphone.conf"
          - "--mount=$CONTAINER_DIR/opt/tiny/pipewire/libpipewire-module-tiny-audio.so:/usr/lib/aarch64-linux-gnu/pipewire-0.3/libpipewire-module-tiny-audio.so"
          - "--mount=$CONTAINER_DIR/opt/tiny/pipewire/libpipewire-module-tiny-microphone.so:/usr/lib/aarch64-linux-gnu/pipewire-0.3/libpipewire-module-tiny-microphone.so"
        enabled: true
      - type: "option"
        name: 启用 fcitx 输入法
        description: |
          启用以确保容器能识别已安装的 fcitx 输入法。
          按 Ctrl + 空格 来切换输入法。
        args:
          - --mount=$CONTAINER_DIR/usr/share/applications/org.fcitx.Fcitx5.desktop:/home/tiny/.config/autostart/org.fcitx.Fcitx5.desktop
        env:
          - SDL_IM_MODULE=fcitx
          - XMODIFIERS=@im=fcitx
          - QT_IM_MODULE=fcitx
          - GTK_IM_MODULE=fcitx
        enabled: false
      - type: "option"
        name: Hangover 配置
        description: 启用以确保 Hangover 正常工作。
        args:
          - --wine=/usr/bin/wine
        ld_preload:
          - /opt/tiny/extra/libmmap_shim.so
        post_start_container_command: wineserver -p
        enabled: false
  - type: "options"
    name: 图形加速
    description: >-
      使用图形加速可部分利用设备GPU提升系统图形处理表现，
      但由于设备差异也可能导致容器系统及软件运行不稳定甚至异常退出。
    options:
      - type: "option"
        name: Virgl 加速
        description: 使用 Virgl 为使用 OpenGL ES 的应用提供加速。
        env: ["GALLIUM_DRIVER=virpipe"]
        pre_start_host_command: >
          $BIN_DIR/virgl_test_server --use-egl-surfaceless --use-gles
          --socket-path=$CACHE_DIR/tmp/.virgl_test &
        post_end_host_command: pkill virgl_test_server
        enabled: false
      - type: "options"
        name: Adreno GPU 加速
        description: >-
          只有部分 Adreno GPU 可使用的加速选项。
          以下选项最多选一个，其中“启用DRI3”只有在使用 Termux:X11 显示图形界面时才可用。
        options:
          - type: "option"
            name: Turnip + Zink 加速
            env: ["MESA_LOADER_DRIVER_OVERRIDE=zink", "VK_ICD_FILENAMES=/opt/tiny/extra/freedreno_icd.aarch64.json", "TU_DEBUG=noconform", "MESA_VK_WSI_DEBUG=sw"]
            enabled: false
          - type: "option"
            name: 启用 DRI3 的 Turnip + Zink 加速
            description: 你只应该在使用 Termux:X11 时使用它。
            env: ["MESA_LOADER_DRIVER_OVERRIDE=zink", "VK_ICD_FILENAMES=/opt/tiny/extra/freedreno_icd.aarch64.json", "TU_DEBUG=noconform"]
            enabled: false