    enabled: false
  # 图形前端
  # webview类型
  # 如果启用，下次启动容器后将执行command，在端口就绪后用全屏WebView加载链接
  - type: "webview"
    name: "WebView前端示例"
    description: |
      启用后，下次启动容器后将执行命令，并在端口就绪后用全屏WebView加载链接。
      链接被分享时，所有"localhost""127.0.0.1"会被替换成局域网ip地址。
    command: "# python3 -m http.server &"
    # 链接被分享时，所有"localhost""127.0.0.1"会被替换成局域网ip地址。
    link: "http://localhost:8000/"
    enabled: false
  # avnc类型
  # 如果启用，下次启动容器后将执行command，在cacheDir/tmp/.tiny.vnc就绪后用使用AVNC加载链接
  - type: "avnc"
    name: "AVNC前端示例"
    description: |
      启用后，下次启动容器后将执行命令，并在/tmp/.tiny.vnc套接字就绪后使用AVNC加载链接。
      ip和端口号会被忽略，但我们仍需要传入url以供avnc解析。
    command: |
      # sudo service dbus start; \
      # eval `dbus-launch --sh-syntax`; \
      # export XDG_RUNTIME_DIR="/tmp/runtime-tiny"; \
      # mkdir -p $XDG_RUNTIME_DIR; \
      # pipewire > /dev/null 2>&1 & \
      # while [ ! -S "$XDG_RUNTIME_DIR/pipewire-0" ]; do sleep 0.1; done && \
      # wireplumber > /dev/null 2>&1 & \
      # pipewire-pulse > /dev/null 2>&1 & \
      # Xtigervnc -geometry 1440x720 -ZlibLevel=0 -pn -rfbport -1 \
      # -SendPrimary=off -SetPrimary=off -FrameRate=120 -rfbunixpath /tmp/.tiny.vnc -alwaysshared -a 5 -once -depth 24 \
      # -SecurityTypes=None -desktop "Debian-GNU/Linux-13-(trixie)_pd-tiny-linux-vnc" :6 -extension MIT-SHM > /dev/null 2>&1 & \
      # while [ ! -S "/tmp/.tiny.vnc" ]; do sleep 0.1; done && \
      # startxfce4 > /dev/null 2>&1 &
    # ip和端口号会被忽略，但我们仍需要传入url以供avnc解析。安卓侧会读取cacheDir/tmp/.tiny.vnc的信息。
    link: "vnc://127.0.0.1:5906"
    enabled: false
    # 如果开启，会自动根据屏幕大小调整分辨率。
    adapt_to_screen_size: true
    # 缩放比，范围[-1, 1]，对应[0.25, 4]
    scale_ratio: 0
  # x11类型
  # 如果启用，下次启动容器后将以args启动xserver，在X11套接字就绪后执行command，并启动Termux:X11页面
  - type: "x11"
    # 容器启动后，会按下列参数在端口 7902（硬编码，目前无法被更改）启动 X 服务器。
    args: [":6", "-extension", "MIT-SHM"]
    name: "Termux:X11前端示例"
    description: |
      启用后，下次启动容器时将以args启动xserver，在X11套接字文件就绪后执行命令，并启动Termux:X11页面
      不过args参数需要自行编辑配置文件（/.tiny.yaml）。
    command: |
      # sudo service dbus start; \
      # eval `dbus-launch --sh-syntax`; \
      # export XDG_RUNTIME_DIR="/tmp/runtime-tiny"; \
      # mkdir -p $XDG_RUNTIME_DIR; \
      # pipewire > /dev/null 2>&1 & \
      # while [ ! -S "$XDG_RUNTIME_DIR/pipewire-0" ]; do sleep 0.1; done && \
      # wireplumber > /dev/null 2>&1 & \
      # pipewire-pulse > /dev/null 2>&1 & \
      # startxfce4 > /dev/null 2>&1 &
    enabled: false
# 一定不要缺失！这是启动容器的命令！小小容器需要通过它成功在 proot 容器内启动 shell
# 我预设了一些环境变量以便在命令中使用：
# $BIN_DIR是安卓上可执行文件的路径
# $PUBLIC_DIR是给所有容器的公共文件夹，可以通过它在不同容器间传递文件。通常是filesDir/public
# $CONTAINER_DIR是容器目录
# $CACHE_DIR是软件的缓存目录，$CACHE_DIR/tmp 是留给容器的 tmp 目录。
# $EXTRA_ARGS 表示小小容器额外给启动命令添加的 proot 选项。
# $EXTRA_PATH 表示小小容器额外给启动命令添加的可执行文件路径。
# $EXTRA_LD_LIBRARY_PATH 表示小小容器额外给启动命令添加的库路径。
# $EXTRA_LD_PRELOAD 表示小小容器额外给启动命令添加的预加载库路径。
# $EXTRA_ENV 表示小小容器额外给启动命令添加的环境变量。
boot_command: >
  $BIN_DIR/proot $EXTRA_ARGS -H --kill-on-exit --link2symlink --sysvipc
  --kernel-release="Linux localhost 6.17.0-PRoot-Distro #1 SMP PREEMPT_DYNAMIC Fri, 10 Oct 2025 00:00:00 +0000 aarch64 localdomain -1"
  -L --change-id=1000:1000 --rootfs=$CONTAINER_DIR --cwd=/home/tiny
  --bind=/data --bind=/dev --bind=/proc --bind=/sys --bind=/dev/urandom:/dev/random
  --bind=/proc/self/fd:/dev/fd --bind=/proc/self/fd/0:/dev/stdin --bind=/proc/self/fd/1:/dev/stdout --bind=/proc/self/fd/2:/dev/stderr
  --bind=$CONTAINER_DIR/sys/.empty:/sys/fs/selinux
  --bind=$CONTAINER_DIR/proc/.loadavg:/proc/loadavg
  --bind=$CONTAINER_DIR/proc/.stat:/proc/stat
  --bind=$CONTAINER_DIR/proc/.uptime:/proc/uptime
  --bind=$CONTAINER_DIR/proc/.version:/proc/version
  --bind=$CONTAINER_DIR/proc/.vmstat:/proc/vmstat
  --bind=$CONTAINER_DIR/proc/.sysctl_entry_cap_last_cap:/proc/sys/kernel/cap_last_cap
  --bind=$CONTAINER_DIR/proc/.sysctl_inotify_max_user_watches:/proc/sys/fs/inotify/max_user_watches
  --bind=$CACHE_DIR/tmp:/dev/shm
  --bind=$CACHE_DIR/tmp:/tmp
  --bind=$CACHE_DIR/run:/run
  --mount=$PUBLIC_DIR:/home/tiny/公共
  --mount=/storage/self/primary:/mnt/sdcard
  /usr/bin/env -i PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$EXTRA_PATH
  LD_LIBRARY_PATH=$EXTRA_LD_LIBRARY_PATH LD_PRELOAD=$EXTRA_LD_PRELOAD
  DISPLAY=:6 LANG=zh_CN.UTF-8
  MOZ_FAKE_NO_SANDBOX=1 QTWEBENGINE_DISABLE_SANDBOX=1 ELECTRON_DISABLE_SANDBOX=1
  HOME=/home/tiny USER=tiny $EXTRA_ENV
  TERM=xterm-256color COLORTERM=truecolor /bin/bash -l
# 这段命令会在导出容器时在安卓侧执行，然后需要在公共文件夹生成一个 rootfs.tar.zst 导出文件。
# 软件会找到此文件并重命名为code-时间戳.tar.zst，并默认放到 Document 文件夹。
# 是的，导出的命令需要你自己提供！因为我不知道哪些文件需要打包到 rootfs 中
# 这个例子中以 root 身份进入容器，然后执行 /opt/tiny/export.sh 定义的导出步骤。
# “导出”代表这个容器是分享给其他人使用的，所以默认的例子会先执行可能的隐私文件清理
# 请确认它不会误删你的文件。
export_command: >
  $BIN_DIR/proot -H --kill-on-exit --link2symlink --sysvipc
  --kernel-release="Linux localhost 6.17.0-PRoot-Distro #1 SMP PREEMPT_DYNAMIC Fri, 10 Oct 2025 00:00:00 +0000 aarch64 localdomain -1"
  -L --rootfs=$CONTAINER_DIR --cwd=/root
  --bind=/data --bind=/dev --bind=/proc --bind=/sys --bind=/dev/urandom:/dev/random
  --bind=/proc/self/fd:/dev/fd --bind=/proc/self/fd/0:/dev/stdin --bind=/proc/self/fd/1:/dev/stdout --bind=/proc/self/fd/2:/dev/stderr
  --bind=$CONTAINER_DIR/sys/.empty:/sys/fs/selinux
  --bind=$CONTAINER_DIR/proc/.loadavg:/proc/loadavg
  --bind=$CONTAINER_DIR/proc/.stat:/proc/stat
  --bind=$CONTAINER_DIR/proc/.uptime:/proc/uptime
  --bind=$CONTAINER_DIR/proc/.version:/proc/version
  --bind=$CONTAINER_DIR/proc/.vmstat:/proc/vmstat
  --bind=$CONTAINER_DIR/proc/.sysctl_entry_cap_last_cap:/proc/sys/kernel/cap_last_cap
  --bind=$CONTAINER_DIR/proc/.sysctl_inotify_max_user_watches:/proc/sys/fs/inotify/max_user_watches
  --bind=$CACHE_DIR/tmp:/dev/shm
  --bind=$CACHE_DIR/tmp:/tmp
  --bind=$CACHE_DIR/run:/run
  --mount=$PUBLIC_DIR:/公共
  /usr/bin/env -i PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  LANG=zh_CN.UTF-8
  TERM=xterm-256color COLORTERM=truecolor /bin/bash /opt/tiny/export.sh
# 快捷命令的每一项的类型可以是“命令集合”或“命令”。
# 如果类型是命令，就需要包含名称、简介（可以缺失）、命令内容。
# 如果类型是命令集合，就需要包含名称、简介（可以缺失）、一堆命令。
# 当用户希望重置快捷命令时，会以默认快捷命令恢复。
quick_commands:
  - type: "command"
    name: 检查软件包更新并升级
    description: 一次性进行修复、更新、升级、清理软件包操作。不是更新小小容器软件本身！
    command: >
      sudo dpkg --configure -a && sudo apt update &&
      sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
      -o Dpkg::Options::="--force-confdef"
      -o Dpkg::Options::="--force-confold" full-upgrade &&
      sudo apt autoremove -y
  - type: "command"
    name: 查看系统信息
    description: 使用 fastfetch 查看系统信息
    command: fastfetch --structure meow && fastfetch --logo none
  - type: "command"
    name: 清屏
    command: clear
  - type: "command"
    name: 中断
    description: 向当前会话发送 Ctrl + C
    command: "\x03"
  - type: "command"
    name: 清理包管理器缓存
    command: sudo apt clean
  - type: "commands"
    name: 安装 XFCE 图形界面
    description: 基本上预装 XFCE 的容器就是这么做的。
    commands:
    - type: "command"
      name: 安装图形界面
      description: 一次性安装 xfce, tigervnc和pipewire。
      command: >
        sudo apt update &&
        sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
        -o Dpkg::Options::="--force-confdef"
        -o Dpkg::Options::="--force-confold" install dbus-x11 xfce4 tigervnc-standalone-server pipewire &&
        sudo apt autoremove --purge pulseaudio
    - type: "command"
      name: 安装 Yaru 主题
      description: "会让你的界面看上去像 Ubuntu。\n仅安装主题，不包含配置步骤。\n你仍需要去外观设置手动选择主题，手动更换图标、壁纸、边栏位置等等。"
      command: >
        sudo apt update &&
        sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
        -o Dpkg::Options::="--force-confdef"
        -o Dpkg::Options::="--force-confold" install yaru-theme-gtk yaru-theme-icon
    - type: "command"
      name: 安装 Breeze 主题
      description: "会让你的界面看上去像使用 KDE 的桌面。\n仅安装主题，不包含配置步骤。\n你仍需要去外观设置手动选择主题，手动更换图标、壁纸、边栏位置等等。"
      command: >
        sudo apt update &&
        sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
        -o Dpkg::Options::="--force-confdef"
        -o Dpkg::Options::="--force-confold" install breeze-gtk-theme breeze-icon-theme breeze-wallpaper breeze-cursor-theme
    - type: "command"
      name: 安装 rime 输入法
      description: 安装 fcitx rime 输入法。安装后需要去选项配置-杂项中启用 fcitx 输入法。
      command: >
        sudo apt update &&
        sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
        -o Dpkg::Options::="--force-confdef"
        -o Dpkg::Options::="--force-confold" install fcitx5-rime
  - type: "commands"
    name: 软件管理
    description: |
      在这里安装或卸载少数几个软件。想要更多还得自行熟悉 Linux 系统操作...
      已安装的软件可以在图形界面左下角开始菜单中找到
    commands:
      - type: "commands"
        name: 办公软件 OnlyOffice
        description: |
          如果你不执着于使用 WPS，那么 OnlyOffice 是个不错的替代。
          OnlyOffice 有安卓版本
        commands:
          - type: "command"
            name: 安装
            command: >
              wget https://download.onlyoffice.com/install/desktop/editors/linux/onlyoffice-desktopeditors_arm64.deb -O /tmp/office.deb &&
              sudo apt update &&
              sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
              -o Dpkg::Options::="--force-confdef"
              -o Dpkg::Options::="--force-confold"
              install patchelf /tmp/office.deb;
              patchelf --clear-execstack /opt/onlyoffice/desktopeditors/libQt5Gui.so.5;
              rm /tmp/office.deb
          - type: "command"
            name: 卸载
            command: sudo apt autoremove --purge -y onlyoffice-desktopeditors
      - type: "commands"
        name: 图形处理软件 Krita
        description: |
          虽然其实是绘画软件！
          强烈建议关闭 Krita 软件内的图形加速，这样会流畅很多，搭配 Termux:X11 完全可以画画。
          Krita 有安卓版本
        commands:
          - type: "command"
            name: 安装
            command: >
              sudo apt update &&
              sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
              -o Dpkg::Options::="--force-confdef"
              -o Dpkg::Options::="--force-confold"
              install krita krita-l10n
          - type: "command"
            name: 卸载
            command: sudo apt autoremove --purge -y krita krita-l10n
      - type: "commands"
        name: 科学计算软件 Octave
        description: 一定程度上可以作为 Matlab 的平替。
        commands:
          - type: "command"
            name: 安装
            command: >
              sudo apt update &&
              sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
              -o Dpkg::Options::="--force-confdef"
              -o Dpkg::Options::="--force-confold"
              install octave
          - type: "command"
            name: 卸载
            command: sudo apt autoremove --purge -y octave
      - type: "commands"
        name: 视频剪辑软件 Kdenlive
        commands:
          - type: "command"
            name: 安装
            command: >
              sudo apt update &&
              sudo -E env DEBIAN_FRONTEND=noninteractive apt -y
