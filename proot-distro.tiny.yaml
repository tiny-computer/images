# 一个示例如下。除非明确说明某个键可以不写，否则都应该写上。

# 代号必须是合法文件名，容器会被放到以该值命名的文件夹
code: "trixie"
name: "Debian Trixie"
description: |
  w... Debian 盒装安装媒介！！！
  
  这是一个没有预装图形界面的、纯命令行版本。
# 图片预览。只能是图片地址。
preview: "/opt/tiny/preview.png"
# 介绍你的容器的网页。可以缺失。
# webpage: "https://www.github.com/Cateners/tiny_computer"
# 小小容器提供若干功能，可以按需使用。
feature:
  # type代表需要使用的功能类型。audio、microphone类型只能出现一次，图形前端只能启用一个
  # audio类型
  # 如果启用，下次启动容器后安卓侧将读取播放cacheDir/tmp/.tiny.audio的音频。
  # 容器内部需要自行将音频送到/tmp/.tiny.audio。格式请参考源码。
  - type: "audio"
    name: "音频播放"
    description: "开启后，将持续获取容器内音频并播放。下次启动容器时生效。"
    enabled: false
  # microphone类型
  # 开启时，小小容器将申请麦克风权限，并连接cacheDir/tmp/.tiny.mic发送麦克风音频
  # 容器内部需要自行处理从/tmp/.tiny.mic接收的音频。格式请参考源码。
  # 只可以临时启用，没有enabled属性
  - type: "microphone"
    name: "麦克风转发"
    description: "启动麦克风，将音频实时转发到容器。麦克风持续开启会比较耗电，记得关闭！"
  # lstat-cache类型
  # 如果你认为某个文件或文件夹在容器运行时不会改变，而且它很频繁地被访问，就很适合放在这里！
  # 软件会缓存这些文件的lstat信息，此后proot在解析路径时直接读取缓存的信息。也许可以让运行快那么0.1%。
  - type: "lstat-cache"
    name: "缓存路径信息"
    description: |
      软件会缓存这些路径的lstat信息，此后proot在解析路径时直接读取缓存的信息。也许可以让运行快那么0.1%。
      当然，只有你肯定这个路径在文件或文件夹在容器运行时不改变才可以添加。
    # 填写真实路径。可使用$CONTAINER_DIR（容器目录）和$CACHE_DIR（缓存目录）
    path:
      - $CONTAINER_DIR
      - $CONTAINER_DIR/usr/bin
      - $CONTAINER_DIR/usr/lib/aarch64-linux-gnu/ld-linux-aarch64.so.1
